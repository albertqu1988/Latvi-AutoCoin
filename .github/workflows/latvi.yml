name: Latvi Auto Coin

on:
  schedule:
    - cron: '7 0,12 * * *'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: pip install requests

      - name: Install sing-box
        run: |
          wget -qO sb.tar.gz https://github.com/SagerNet/sing-box/releases/download/v1.13.7/sing-box-1.13.7-linux-amd64.tar.gz
          tar -xzf sb.tar.gz
          mv sing-box-*/sing-box ./
          chmod +x sing-box

      - name: Start hy2 tunnel
        env:
          HY2_URL: "hysteria2://f809270f-5fe8-4075-8ddb-254208b4d57a@103.116.52.143:26036?peer=www.bing.com&insecure=1&alpn=h3"
        run: |
          cat > sb.json <<EOF
          {"log":{"level":"warn"},"inbounds":[{"type":"socks","tag":"in","listen":"127.0.0.1","listen_port":1080}],"outbounds":[{"type":"hysteria2","tag":"out","server":"103.116.52.143","server_port":26036,"password":"f809270f-5fe8-4075-8ddb-254208b4d57a","tls":{"enabled":true,"server_name":"www.bing.com","alpn":["h3"],"insecure":true}}]}
          EOF
          ./sing-box run -c sb.json &
          sleep 3
          echo "Tunnel IP:"
          curl -sS --socks5 127.0.0.1:1080 --max-time 8 https://api.ipify.org || echo "tunnel failed"

      - name: Run latvi_coin_uc.py
        env:
          LATVI_EMAIL: ${{ secrets.LATVI_EMAIL }}
          LATVI_PASSWORD: ${{ secrets.LATVI_PASSWORD }}
          PROXY_URL: "socks5://127.0.0.1:1080"
        run: python latvi_coin_uc.py
