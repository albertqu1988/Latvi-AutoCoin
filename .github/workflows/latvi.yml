name: Latvi Auto Coin

on:
  schedule:
    - cron: '7 0,12 * * *'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Chrome
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq google-chrome-stable 2>/dev/null || true

      - name: Install deps
        run: pip install seleniumbase requests

      - name: Download Gost
        run: |
          wget -q https://github.com/ginuerzh/gost/releases/download/v2.11.5/gost-linux-amd64-2.11.5.gz
          gunzip gost-linux-amd64-2.11.5.gz
          chmod +x gost-linux-amd64-2.11.5
          mv gost-linux-amd64-2.11.5 gost

      - name: Run latvi_coin_uc.py
        env:
          LATVI_EMAIL: ${{ secrets.LATVI_EMAIL }}
          LATVI_PASSWORD: ${{ secrets.LATVI_PASSWORD }}
          PROXY_LIST: "socks5://44fa737d:1bab4a4504ca@38.96.191.150:21719,http://5l7Cpl8Kt8ai-flux-tw-sid-b2c33f70a1bf-sesstime-120:X0s2ebFaZiWR@as.talordata.net:2600,http://5l7Cpl8Kt8ai-flux-us-sid-dd7a7937feaf-sesstime-120:X0s2ebFaZiWR@na.talordata.net:2600,http://5l7Cpl8Kt8ai-flux-jp-sid-a3c44e82c9fg-sesstime-120:X0s2ebFaZiWR@as.talordata.net:2600"
